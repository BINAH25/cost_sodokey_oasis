<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/oasis-logo.png" />
    <link rel="apple-touch-icon" href="/oasis-logo.png" />
    <!-- Preload the hero logo so it appears instantly on first paint -->
    <link rel="preload" as="image" href="/oasis-logo.webp" fetchpriority="high" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Oasis Massage & Wellness | Luxury Massage Therapy in Accra, Ghana</title>
    <meta
      name="description"
      content="Oasis Massage & Wellness in Darkuman, Accra — luxury massage therapy, Meridian Wellness, and therapeutic recovery. Relax, Renew, Restore, Revive. Book your session today."
    />
    <meta
      name="keywords"
      content="massage Accra, massage therapy Ghana, Swedish massage, deep tissue massage, meridian wellness, FOHOW, wellness Accra, spa Darkuman, therapeutic massage, Oasis Massage"
    />
    <meta name="author" content="Oasis Massage & Wellness" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://oasismassagewellness.com/" />
    <meta name="theme-color" content="#0f1d17" />

    <!-- Geo (helps local search) -->
    <meta name="geo.region" content="GH-AA" />
    <meta name="geo.placename" content="Darkuman, Accra, Ghana" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Oasis Massage & Wellness" />
    <meta property="og:title" content="Oasis Massage & Wellness | Luxury Massage Therapy in Accra" />
    <meta
      property="og:description"
      content="Your sanctuary for relaxation and wellness in Accra. Professional massage therapy, Meridian Wellness, and therapeutic recovery."
    />
    <meta property="og:url" content="https://oasismassagewellness.com/" />
    <meta property="og:image" content="https://oasismassagewellness.com/oasis-logo.jpeg" />
    <meta property="og:locale" content="en_GH" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oasis Massage & Wellness | Luxury Massage Therapy in Accra" />
    <meta
      name="twitter:description"
      content="Your sanctuary for relaxation and wellness in Accra. Massage therapy, Meridian Wellness, and therapeutic recovery."
    />
    <meta name="twitter:image" content="https://oasismassagewellness.com/oasis-logo.jpeg" />

    <!-- Structured data: local business (helps Google show address, hours, etc.) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HealthAndBeautyBusiness",
        "name": "Oasis Massage & Wellness",
        "image": "https://oasismassagewellness.com/oasis-logo.jpeg",
        "url": "https://oasismassagewellness.com/",
        "telephone": "+233243248922",
        "email": "Infooasismassagewellness@gmail.com",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Darkuman, opposite Sunflower School, near Star Oil",
          "addressLocality": "Accra",
          "addressCountry": "GH"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            "opens": "09:00",
            "closes": "19:00"
          }
        ],
        "sameAs": [
          "https://www.instagram.com/costsimons_",
          "https://www.tiktok.com/@cost.simons",
          "https://www.facebook.com/share/192UXVr1NL/?mibextid=wwXIfr"
        ],
        "slogan": "Relax • Renew • Restore • Revive"
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
