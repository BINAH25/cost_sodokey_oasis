services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Empty VITE_API_URL → the SPA calls /api/ relative to its own origin,
      # which nginx (in this image) proxies to the backend container.
      args:
        VITE_API_URL: ""
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # No published port: only the frontend's nginx reaches it, over the
    # internal Docker network at http://backend:8000.
    expose:
      - "8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      # Requests arrive proxied from nginx with Host = the public domain.
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-oasismassagewellness.com,www.oasismassagewellness.com,localhost,127.0.0.1,backend}
      - DATABASE_URL=postgres://oasis:oasis@db:5432/oasis
      # Needed for admin login form POSTs over https.
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://oasismassagewellness.com,https://www.oasismassagewellness.com}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-Oasis Massage & Wellness <Infooasismassagewellness@gmail.com>}
      - OWNER_NOTIFICATION_EMAIL=${OWNER_NOTIFICATION_EMAIL:-costsimons5@gmail.com}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oasis
      POSTGRES_USER: oasis
      POSTGRES_PASSWORD: oasis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oasis"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
