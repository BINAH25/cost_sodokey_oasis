<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Oasis Massage &amp; Wellness{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f1ea; font-family:Georgia, 'Times New Roman', serif; color:#2c2c2c;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f1ea; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px; background-color:#ffffff; border:1px solid #e6e0d4; border-radius:16px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04);">

          <!-- Header: dark emerald band so the logo's dark square blends in -->
          <tr>
            <td style="background-color:#0f1d17; padding:28px 32px 22px; text-align:center; border-bottom:3px solid #d4af6b;">
              <img src="cid:oasis-logo" alt="Oasis Massage &amp; Wellness" width="170"
                   style="display:block; margin:0 auto; max-width:170px; height:auto;">
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 32px 30px; border-top:1px solid #ece7dc; text-align:center; background-color:#faf8f3;">
              <div style="font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#b8923f; margin-bottom:10px;">
                Relax &bull; Renew &bull; Restore &bull; Revive
              </div>
              <div style="font-size:13px; color:#6b6b6b; line-height:1.7;">
                Oasis Massage &amp; Wellness<br>
                Darkuman, opposite Sunflower School, Star Oil &mdash; Accra<br>
                <a href="tel:+233243248922" style="color:#b8923f; text-decoration:none;">+233 24 324 8922</a>
                &nbsp;&bull;&nbsp;
                <a href="https://oasismassagewellness.com" style="color:#b8923f; text-decoration:none;">oasismassagewellness.com</a>
              </div>
            </td>
          </tr>

        </table>
        <div style="margin-top:16px; font-size:11px; color:#a39d8e;">
          &copy; Oasis Massage &amp; Wellness
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
